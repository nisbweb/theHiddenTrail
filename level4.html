<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Hidden Trail - Level 4 - The Paradox Archive</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js" defer></script>
  <script src="level4.js" defer></script>
</head>
<body class="level4">
  <header class="shared">
    <div class="center">The Hidden Trail</div>
  </header>
  <div class="centered">
    <div class="typewriter" data-text="Only 15 minutes left. The Antagonist takes control."></div>
    <div id="chat" style="background:#050202;padding:1rem;border-radius:6px;min-height:120px;color:var(--fg);">
      <div id="messages"></div>
    </div>

    <div id="doors" style="margin-top:12px;">
      <button class="btn" id="door1">DOOR 1: The Path of Gold (Lies)</button>
      <button class="btn" id="door2">DOOR 2: The Path of Blood (Violence)</button>
      <button class="btn" id="door3">DOOR 3: The Path of Silence</button>
    </div>
    <div style="margin-top:12px;">
      <button id="mapIcon" class="map-icon btn" title="Map">🗺️</button>
    </div>
    <div class="typewriter" data-text="I have cities, but no houses. I have mountains, but no trees. I have water, but no fish. What am I?"></div>
    <div class="hint-command" style="margin-top:14px;">
      <form><input placeholder="> _" /></form>
    </div>
  </div>
</body>
</html>
