<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Hidden Trail - Failure</title>
  <link rel="stylesheet" href="shared.css">
  <script>
  document.addEventListener('DOMContentLoaded', ()=>{
    const reason = sessionStorage.getItem('failReason') || 'timeout'; const score = sessionStorage.getItem('score') || '0';
    const out = document.getElementById('output'); if(reason === 'selfish'){
      out.textContent = `> SCORE SUBMITTED.\n> You chose yourself over the truth.\n> The files were deleted. The Archivist's message was never delivered.\n> RANK: ✗ COMPROMISED\n> FINAL SCORE: ${score}`;
    } else {
      out.textContent = `> CONNECTION LOST.\n> TIME EXPIRED. THE WIPE COMMAND EXECUTED.\n> The Archivist's files are gone forever.\n> RANK: ✗ ELIMINATED\n> FINAL SCORE: ${score}`;
    }
    document.getElementById('playAgain').addEventListener('click', ()=>{ sessionStorage.clear(); window.location.href='index.html'; });
  });
  </script>
</head>
<body>
  <header class="shared">
    <img src="white.png" class="logo" alt="Event logo">
    <div class="center">The Hidden Trail</div>
    <img src="image.png" class="corner" alt="Sponsor logo">
  </header>
  <div class="centered">
    <pre id="output" style="color:var(--fg)"></pre>
    <button id="playAgain" class="btn" style="margin-top:12px">PLAY AGAIN</button>
  </div>
</body>
</html>
